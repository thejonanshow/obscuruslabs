app = 'obscuruslabs-staging'
primary_region = 'iad'

[build]

[env]
  SITE_MODE = 'full'
  NOINDEX = 'true'
  NEXT_PUBLIC_SITE_URL = 'https://stg.obscuruslabs.com'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
