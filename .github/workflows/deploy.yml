name: Deploy

# Fast deploys: pull the image that Build already pushed to Fly's registry,
# tell Fly to roll it out. No rebuild. Typical deploy is ~20-30s end-to-end.

on:
  workflow_run:
    workflows: [Build]
    types: [completed]
    branches: [main, staging]

concurrency:
  group: deploy-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  deploy:
    # Only deploy when the Build run that fed us was itself successful AND
    # came from a real branch push (not a PR event).
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy (production)
        if: github.event.workflow_run.head_branch == 'main'
        run: >
          flyctl deploy
          --remote-only=false
          --image registry.fly.io/obscuruslabs:sha-${{ github.event.workflow_run.head_sha }}
          --config fly.toml
          -a obscuruslabs
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy (staging)
        if: github.event.workflow_run.head_branch == 'staging'
        run: >
          flyctl deploy
          --remote-only=false
          --image registry.fly.io/obscuruslabs:sha-${{ github.event.workflow_run.head_sha }}
          --config fly.staging.toml
          -a obscuruslabs-staging
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
