name: Build

# Build the Docker image once per commit and push it to Fly's registry tagged
# with the commit SHA. Deploys reuse this artifact — no rebuild on merge.

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # Skip the push step on PRs from forks (no registry creds). Build still runs
    # to validate the Dockerfile; the image just doesn't get published.
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Fly Registry
        if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
        uses: docker/login-action@v3
        with:
          registry: registry.fly.io
          username: x
          password: ${{ secrets.FLY_API_TOKEN }}

      - name: Build (+ push on trusted refs)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
          tags: |
            registry.fly.io/obscuruslabs:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
